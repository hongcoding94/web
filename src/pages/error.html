<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        .error_body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .error-container {
            text-align: center;
            padding: 0px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to bottom, #58a6ff, #1f6feb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-message {
            font-size: 1.5rem;
            margin: 10px 0 30px 0;
            color: #8b949e;
        }
        .divider {
            height: 1px;
            width: 50px;
            background-color: #30363d;
            margin: 20px auto;
        }
        .nav-button {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .nav-button:hover {
            background-color: #2ea043;
        }
        .status-info {
            margin-top: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #484f58;
        }
    </style>
</head>
<body class="error_body">
    <div class="error-container">
        <h1 class="error-code">ERROR</h1>
        <p class="error-message">요청하신 작업을 처리하는 중 예외가 발생했습니다.</p>
        
        <div class="divider"></div>
        
        <a href="/src/pages/index.html" class="nav-link">
            <a href="/src/pages/index.html" class="nav-button">Go to Home</a>
        </a>

        <div class="status-info">
            현재 시간 : <span id="timestamp"></span>
        </div>
    </div>
</body>
<script>
    (function() {
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = now.toISOString().split('.')[0].replace('T', ' ');
        }
        
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
    })();
</script>

</html>
